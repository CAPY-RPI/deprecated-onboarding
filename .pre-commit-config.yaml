repos:
  -   repo: local
      hooks:
      - id: mypy
        name: mypy
        entry: "mypy"
        language: python
        language_version: python3.12
        additional_dependencies: ["mypy==1.15.0"]
        types: [python]
        require_serial: true
        verbose: true
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.2
    hooks:
      - id: flake8
default_stages: [pre-commit, pre-push]
default_language_version:
    python: python3.12
